<!doctype html>
<html lang="uk">
<head>
<meta charset="utf-8" />
 <meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Війна петпетів</title>
<link rel="stylesheet" href="css/styles.css">
 </head>
<body>
<div class="app">
 <aside id="sidebar">
    <h1>Війна петпетів</h1>
    <div class="turn">Хід: <strong id="turnPlayer"></strong> <small id="turnCount" style="margin-left:8px;color:#666"></small></div>
    <div id="selectedCard" class="card-info">
    <em>Жодної карти не обрано.</em>
    </div>
	<div class="sidebar-actions">
		<button id="playBtn" title="Розіграти обрану карту">Розіграти</button>
		<button id="petBtn" title="Можна використати будь-яку карту, щоб зробити один пет іншому гравцю!">Запетпетати</button>
		<button id="toggleTurnBtn" title="Розпочати або завершити свій хід! На 10 хід гра завершується!">Почати хід</button>
	</div>
 </aside>

    <section class="player" id="player1">
		<h2>Дуля</h2>
		<div class="modifiers" id="mods-player1">
			          <!-- modifiers will be injected -->
		</div>
		<div class="cards" id="cards-player1">
			          <!-- 4 card buttons -->
		</div>
	</section>

	<section class="player" id="player2">
		<h2>Океляр</h2>
		<div class="modifiers" id="mods-player2">
			          <!-- modifiers will be injected -->
		</div>
		<div class="cards" id="cards-player2">
			          <!-- 4 card buttons -->
		</div>
	</section>
</div>

<script type="module" src="js/main.js"></script>
</body>
</html>
